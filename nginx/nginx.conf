
events {}

http {
	include       mime.types;
	default_type  application/octet-stream;

	sendfile        on;
	keepalive_timeout  65;

	# backends
	upstream auth_backend {
		server auth_service:3001;
	}
	upstream booking_backend {
		server booking_service:3002;
	}

	# frontend MFE/host upstreams (use container_name from docker-compose)
	upstream mfe_admin {
		server mfe_admin:80;
	}
	upstream mfe_events {
		server mfe_events:80;
	}
	upstream mfe_host {
		server mfe_host:80;
	}

	server {
		listen 80;
		server_name _;

		# Ensure requests without trailing slash redirect to canonical path
		location = /mfe-admin {
			return 301 /mfe-admin/;
		}
		location = /mfe-events {
			return 301 /mfe-events/;
		}

		# API proxies - preserve original request URI
		location /auth/ {
			proxy_pass http://auth_backend$request_uri;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_http_version 1.1;
			proxy_set_header Connection "";
		}

		location /booking/ {
			proxy_pass http://booking_backend$request_uri;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_http_version 1.1;
			proxy_set_header Connection "";
		}

		# MFE proxies — preserve $request_uri so apps built with subpath work correctly.
		# If an MFE is built to expect root ("/"), use a rewrite to strip the prefix instead.
		# If your MFE is built with base path (/mfe-admin/ or /mfe-events/),
		# you can preserve $request_uri (see commented block below).
		# If the MFE expects root ("/"), use the rewrite below to strip the prefix
		# before proxying to the upstream. This prevents redirect loops caused by
		# upstream sending Location: /somepath which the gateway then redirects again.

		# --- Strip-prefix (safe fallback when app expects root) ---
		location ^~ /mfe-admin/ {
			# Preserve the original request URI so the upstream (MFE) which is
			# configured to serve under /mfe-admin/ can handle paths correctly.
			proxy_pass http://mfe_admin$request_uri;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_http_version 1.1;
			proxy_set_header Connection "";
			# Rewrite upstream Location headers that point to root (/) or absolute
			# URLs to the correct prefixed path so clients are redirected to
			# /mfe-admin/ instead of /. Upstream may return absolute Location
			# (e.g. http://localhost/ or http://mfe_admin/), so handle all forms.
			proxy_redirect / /mfe-admin/;
			proxy_redirect http://localhost/ /mfe-admin/;
			proxy_redirect http://mfe_admin/ /mfe-admin/;
		}

		location ^~ /mfe-events/ {
			proxy_pass http://mfe_events$request_uri;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_http_version 1.1;
			proxy_set_header Connection "";
			proxy_redirect / /mfe-events/;
			proxy_redirect http://localhost/ /mfe-events/;
			proxy_redirect http://mfe_events/ /mfe-events/;
		}

		# --- Alternative (if MFE is built with subpath) ---
		# location ^~ /mfe-admin/ {
		#     proxy_pass http://mfe_admin$request_uri;
		#     ...
		# }

		# Optional: serve static from host container
		location /static/ {
			proxy_pass http://mfe_host$request_uri;
		}

		# Host app (container named mfe_host built from frontend/host)
		location / {
			proxy_pass http://mfe_host$request_uri;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_http_version 1.1;
			proxy_set_header Connection "";
		}

		# Security headers (optional)
		add_header X-Frame-Options "SAMEORIGIN" always;
		add_header X-Content-Type-Options "nosniff" always;
		add_header Referrer-Policy "no-referrer-when-downgrade" always;
	}
}

