services:
  db:
    image: postgres:16-alpine
    container_name: db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/db_init.sql:/docker-entrypoint-initdb.d/db_init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend_net

  auth_service:
    build:
      context: .
      dockerfile: backend/Dockerfile.auth
    container_name: auth_service
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net
      - proxy_net

  booking_service:
    build:
      context: .
      dockerfile: backend/Dockerfile.booking
    container_name: booking_service
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net
      - proxy_net

  host:
    build:
      context: ./frontend
      dockerfile: host/Dockerfile
      args:
        NODE_ENV: production
        VITE_AUTH_API_URL: /auth
        VITE_BOOKING_API_URL: /booking
        EVENTS_URL: /mfe-events
        ADMIN_URL: /mfe-admin
    container_name: mfe_host
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL","curl -f http://localhost/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proxy_net

  mfe-admin:
    build:
      context: ./frontend
      dockerfile: mfe-admin/Dockerfile
      args:
        NODE_ENV: production
        VITE_BOOKING_API_URL: /booking
        HOST_URL: http://localhost
    container_name: mfe_admin
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL","curl -f http://localhost/mfe-admin/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proxy_net

  mfe-events:
    build:
      context: ./frontend
      dockerfile: mfe-events/Dockerfile
      args:
        NODE_ENV: production
        VITE_BOOKING_API_URL: /booking
        HOST_URL: http://localhost
    container_name: mfe_events
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL","curl -f http://localhost/mfe-events/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proxy_net

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth_service
      - booking_service
      - host
      - mfe-admin
      - mfe-events
    networks:
      - proxy_net

volumes:
  postgres_data:

networks:
  backend_net:
  proxy_net: