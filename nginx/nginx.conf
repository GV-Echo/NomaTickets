# Конфигурация Nginx как реверс-прокси
worker_processes auto;                          # кол-во воркеров = кол-ву CPU

events {
    worker_connections 1024;                    # максимум одновременных соединений на воркер
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Формат логов
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    sendfile        on;
    keepalive_timeout 65;

    # Скрываем версию nginx в заголовках
    server_tokens off;

    # ──────────────────────────────────────────────
    # Upstream-блоки (балансировка / health checks)
    # ──────────────────────────────────────────────
    upstream auth_service {
        server auth_service:3001;               # имя сервиса из docker-compose
    }

    upstream booking_service {
        server booking_service:3002;
    }

    upstream frontend {
        server frontend:80;
    }

    # ──────────────────────────────────────────────
    # Основной виртуальный хост
    # ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;                          # принимать любой хост

        # Общие заголовки для всех проксируемых ответов
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;   # поддержка WebSocket
        proxy_set_header   Connection        "upgrade";

        # ── Auth Service (/auth/**) ────────────────
        location /auth/ {
            proxy_pass http://auth_service;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ── Booking Service (/booking/**) ──────────
        location /booking/ {
            proxy_pass http://booking_service;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ── Frontend (React SPA, все остальные пути) ─
        location / {
            proxy_pass http://frontend;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }
    }
}

